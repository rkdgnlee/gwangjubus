buildscript {
    ext {
        buildToolsVersion = "34.0.0"  // 36 -> 34 또는 35로 하향
        minSdkVersion = 30
        compileSdkVersion = 35      // 36 -> 34 또는 35
        targetSdkVersion = 35       // 36 -> 34 또는 35
        ndkVersion = "27.0.12077973" // NDK도 조금 더 안정적인 버전 권장
        kotlinVersion = "1.8.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
